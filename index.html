<HTML>

<HEAD>
    <title>Background Image Tiling</title>
    <style>
      body {
        background-image: url("../assets/images/bg.png");
        background-repeat: repeat; /* tiling horizontally and vertically */
        background-position: center; /* center the image */
        background-attachment: fixed; /* fix the image so it doesn't scroll with the content */
      }
    </style>
    
    <style>
      #myText {
        font-size: 36px;
        color: red;
      }
    </style>
    <script>
      var colors = ['red', 'green', 'blue', 'yellow']; // array of colors to cycle through
      var index = 0; // start with the first color

      function cycleColor() {
        var text = document.getElementById("myText");
        text.style.color = colors[index]; // set the text color to the current color
        index = (index + 1) % colors.length; // increment the index and loop back to 0 when it reaches the end
      }

      setInterval(cycleColor, 500); // call the cycleColor function every second
    </script>
    <style>
        h2 {color:red;}
    </style>
    
  </head>
