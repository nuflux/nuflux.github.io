<!DOCTYPE html>
<html>
  <head>
    <title>Color Cycling Text</title>
    <style>
      #myText {
        font-size: 36px;
        color: red;
      }
    </style>
    <script>
      var colors = ['red', 'green', 'blue', 'yellow']; // array of colors to cycle through
      var index = 0; // start with the first color

      function cycleColor() {
        var text = document.getElementById("myText");
        text.style.color = colors[index]; // set the text color to the current color
        index = (index + 1) % colors.length; // increment the index and loop back to 0 when it reaches the end
      }

      setInterval(cycleColor, 500); // call the cycleColor function every second
    </script>
  </head>
  <body>
    <p id="myText">This text will cycle through colors.</p>
  </body>
</html>
